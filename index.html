<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Check-In App</title>
    <script>
      window.addEventListener('error', function(event) {
        document.body.innerHTML += '<div style="color: red; background: white; padding: 20px; position: fixed; top: 0; left: 0; z-index: 10000;">ERROR: ' + event.message + ' at ' + event.filename + ':' + event.lineno + '</div>';
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
